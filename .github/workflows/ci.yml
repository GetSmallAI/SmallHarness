name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --verbose
      - run: cargo test --verbose
